<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fechadura Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <div class="lock-icon" id="lockIcon">
      <svg id="lockSvg" width="32" height="32" viewBox="0 0 24 24" fill="none"
        stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <p class="title">Fechadura Frontal</p>
    <p class="subtitle" id="subtitle">Digite sua senha</p>

    <div class="digits" id="digits">
      <div class="digit" id="d0"></div>
      <div class="digit" id="d1"></div>
      <div class="digit" id="d2"></div>
      <div class="digit" id="d3"></div>
      
    </div>

    <div class="keypad">
      <button class="key" onclick="press('1')">1</button>
      <button class="key" onclick="press('2')">2</button>
      <button class="key" onclick="press('3')">3</button>
      <button class="key" onclick="press('4')">4</button>
      <button class="key" onclick="press('5')">5</button>
      <button class="key" onclick="press('6')">6</button>
      <button class="key" onclick="press('7')">7</button>
      <button class="key" onclick="press('8')">8</button>
      <button class="key" onclick="press('9')">9</button>
      <button class="key del" onclick="del()">⌫</button>
      <button class="key" onclick="press('0')">0</button>
      <button class="key confirm" onclick="confirmar()">✓</button>
    </div>

    <p class="hint">Dica de demo: a senha é a mais comum do mundo</p>
  </div>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fechadura Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- MENU LATERAL -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <button class="nav-btn active" id="navLock" onclick="mostrarView('lock')" title="Senha">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </button>

    <button class="nav-btn" id="navStats" onclick="mostrarView('statsPanel')" title="Estatísticas">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
    </button>
  </nav>

  <!-- ÁREA PRINCIPAL -->
  <main class="main">

    <!-- VIEW 1: TELA DE SENHA DA FECHADURA -->
    <section class="view active" id="view-lock">
      <div class="card">
        <div class="lock-icon" id="lockIcon">
          <svg id="lockSvg" width="32" height="32" viewBox="0 0 24 24" fill="none"
            stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>

        <p class="title">Fechadura Frontal</p>
        <p class="subtitle" id="subtitle">Digite sua senha</p>

        <div class="digits" id="digits">
          <div class="digit" id="d0"></div>
          <div class="digit" id="d1"></div>
          <div class="digit" id="d2"></div>
          <div class="digit" id="d3"></div>
        </div>

        <div class="keypad">
          <button class="key" onclick="press('1')">1</button>
          <button class="key" onclick="press('2')">2</button>
          <button class="key" onclick="press('3')">3</button>
          <button class="key" onclick="press('4')">4</button>
          <button class="key" onclick="press('5')">5</button>
          <button class="key" onclick="press('6')">6</button>
          <button class="key" onclick="press('7')">7</button>
          <button class="key" onclick="press('8')">8</button>
          <button class="key" onclick="press('9')">9</button>
          <button class="key del" onclick="del()">⌫</button>
          <button class="key" onclick="press('0')">0</button>
          <button class="key confirm" onclick="confirmar()">✓</button>
        </div>

        <p class="hint">Dica de demo: a senha é a mais comum do mundo</p>
      </div>
    </section>


    <section class="view" id="view-statsPanel">
      <div class="stats-wrap">
        <div class="stats-header">
          <div>
            <p class="stats-title">Estatísticas de acesso</p>
            <p class="stats-subtitle">Histórico de tentativas na fechadura</p>
          </div>
        </div>

        <div class="counters">
          <div class="counter-card success">
            <span class="counter-value" id="countSucesso">0</span>
            <span class="counter-label">Acessos autorizados</span>
          </div>
          <div class="counter-card error">
            <span class="counter-value" id="countFalha">0</span>
            <span class="counter-label">Tentativas negadas</span>
          </div>
        </div>

        <div class="chart-card">
          <div class="chart-header">
            <div>
              <p class="chart-title" id="chartTitle">Acessos na semana</p>
              <p class="chart-subtitle" id="chartSubtitle">Segunda a domingo</p>
            </div>
            <div class="toggle-group">
              <button class="toggle-btn active" id="toggleSemana" onclick="trocarModoGrafico('semana')">Semana</button>
              <button class="toggle-btn" id="toggleHora" onclick="trocarModoGrafico('hora')">Hoje por hora</button>
            </div>
          </div>
          <div class="chart-legend">
            <span class="legend-item"><span class="legend-dot success"></span> Sucesso</span>
            <span class="legend-item"><span class="legend-dot error"></span> Falha</span>
          </div>
          <svg id="chartSvg" class="chart-svg" viewBox="0 0 560 220" preserveAspectRatio="xMidYMid meet"></svg>
        </div>

        <div class="log-list" id="logList">
          <div class="log-empty">Carregando histórico...</div>
        </div>
      </div>
    </section>

  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
